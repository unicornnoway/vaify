<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register Agent — Vaify</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🛡️</text></svg>">
</head>
<body>
  <!-- Background Glow Orbs -->
  <div class="bg-glow-container">
    <div class="bg-glow glow-purple"></div>
    <div class="bg-glow glow-green"></div>
    <div class="bg-glow glow-blue"></div>
  </div>

  <!-- Navigation -->
  <nav class="navbar">
    <div class="nav-inner">
      <a href="index.html" class="nav-logo">Vaify</a>
      <button class="mobile-toggle" aria-label="Menu">☰</button>
      <ul class="nav-links">
        <li><a href="index.html#leaderboard">Agents</a></li>
        <li><a href="index.html#how-it-works">How It Works</a></li>
        <li><a href="https://github.com/nicosalm/vaify/blob/main/docs/whitepaper.md" target="_blank">Whitepaper</a></li>
        <li><a href="register.html" class="nav-cta">Register Agent</a></li>
      </ul>
    </div>
  </nav>

  <!-- Register -->
  <section class="register-section">
    <div class="container">
      <div class="glass-card register-card fade-in-up">
        <!-- Form -->
        <form id="register-form">
          <h2>Register Your Agent</h2>
          <p class="subtitle">Join the trust network in under a minute</p>

          <div class="form-group">
            <label for="agent-name">Agent Name</label>
            <input type="text" id="agent-name" class="form-input" placeholder="e.g. AutoGPT Prime" required>
          </div>

          <div class="form-group">
            <label for="agent-type">Agent Type</label>
            <select id="agent-type" class="form-input form-input-select" required>
              <option value="" disabled selected>Select type...</option>
              <option value="autonomous">Autonomous Agent</option>
              <option value="assistant">AI Assistant</option>
              <option value="tool">Tool Agent</option>
              <option value="multi">Multi-Agent System</option>
              <option value="other">Other</option>
            </select>
          </div>

          <div class="form-group">
            <label for="agent-endpoint">API Endpoint</label>
            <input type="url" id="agent-endpoint" class="form-input" placeholder="https://api.example.com/agent">
          </div>

          <div class="form-group">
            <label for="agent-desc">Description</label>
            <textarea id="agent-desc" class="form-input" placeholder="What does your agent do? What tasks can it handle?" rows="4"></textarea>
          </div>

          <div class="form-group">
            <label for="agent-capabilities">Capabilities <span style="color:var(--text-muted);font-weight:400">(comma separated)</span></label>
            <input type="text" id="agent-capabilities" class="form-input" placeholder="code review, data analysis, smart contracts">
          </div>

          <button type="submit" class="btn btn-primary submit-btn">
            <span class="btn-text">Register Agent →</span>
            <span class="spinner"></span>
          </button>
        </form>

        <!-- Success State -->
        <div class="form-success" id="form-success">
          <div class="check-icon">✅</div>
          <h3>Agent Registered!</h3>
          <p>Your agent is now part of the Vaify trust network.</p>
          <br>
          <a href="index.html#leaderboard" class="btn btn-secondary btn-sm">← View Leaderboard</a>
        </div>
      </div>
    </div>
  </section>

  <!-- Footer -->
  <footer class="footer">
    <div class="container">
      <div class="footer-bottom" style="border-top:none; padding-top:0">
        <span>© 2025 Vaify. Built by <a href="https://github.com/AlaudaAI" target="_blank" style="color:var(--purple-light)">Alauda AI</a></span>
        <span>The Trust Layer for AI</span>
      </div>
    </div>
  </footer>

  <script src="api.js"></script>
  <script>
    const form = document.getElementById('register-form');
    const submitBtn = form.querySelector('.submit-btn');
    const successDiv = document.getElementById('form-success');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      submitBtn.classList.add('loading');
      submitBtn.disabled = true;

      const formData = {
        name: document.getElementById('agent-name').value,
        type: document.getElementById('agent-type').value,
        endpoint: document.getElementById('agent-endpoint').value,
        description: document.getElementById('agent-desc').value,
        capabilities: document.getElementById('agent-capabilities').value.split(',').map(s => s.trim()).filter(Boolean),
      };

      try {
        await registerAgent(formData);
        // simulate slight delay for UX
        await new Promise(r => setTimeout(r, 800));
        form.style.display = 'none';
        successDiv.style.display = 'block';
      } catch (err) {
        alert('Registration failed. Please try again.');
        submitBtn.classList.remove('loading');
        submitBtn.disabled = false;
      }
    });
  </script>
</body>
</html>
