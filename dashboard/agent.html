<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Agent Detail — Vaify</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🛡️</text></svg>">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
</head>
<body>
  <!-- Background Glow Orbs -->
  <div class="bg-glow-container">
    <div class="bg-glow glow-purple"></div>
    <div class="bg-glow glow-green"></div>
    <div class="bg-glow glow-blue"></div>
  </div>

  <!-- Navigation -->
  <nav class="navbar">
    <div class="nav-inner">
      <a href="index.html" class="nav-logo">Vaify</a>
      <button class="mobile-toggle" aria-label="Menu">☰</button>
      <ul class="nav-links">
        <li><a href="index.html#leaderboard">Agents</a></li>
        <li><a href="index.html#how-it-works">How It Works</a></li>
        <li><a href="https://github.com/nicosalm/vaify/blob/main/docs/whitepaper.md" target="_blank">Whitepaper</a></li>
        <li><a href="register.html" class="nav-cta">Register Agent</a></li>
      </ul>
    </div>
  </nav>

  <!-- Agent Detail -->
  <section class="agent-detail">
    <div class="container">
      <a href="index.html#leaderboard" class="back-link fade-in-up">← Back to Leaderboard</a>

      <!-- Hero Card -->
      <div class="glass-card agent-hero-card fade-in-up" id="agent-hero">
        <div class="big-score" id="agent-score">—</div>
        <div class="agent-hero-name" id="agent-name">Loading...</div>
        <div class="agent-hero-meta" id="agent-meta"></div>
      </div>

      <!-- Detail Grid -->
      <div class="detail-grid">
        <!-- Radar Chart -->
        <div class="glass-card detail-card fade-in-up">
          <h3>Score Dimensions</h3>
          <div class="chart-container">
            <canvas id="radar-chart"></canvas>
          </div>
        </div>

        <!-- Dimension Breakdown -->
        <div class="glass-card detail-card fade-in-up">
          <h3>Breakdown</h3>
          <ul class="dimension-list" id="dimension-list">
            <!-- populated by JS -->
          </ul>
        </div>
      </div>

      <!-- Tasks & Reviews -->
      <div class="detail-grid">
        <!-- Recent Tasks -->
        <div class="glass-card detail-card fade-in-up">
          <h3>Recent Tasks</h3>
          <ul class="task-list" id="task-list">
            <!-- populated by JS -->
          </ul>
        </div>

        <!-- Reviews -->
        <div class="glass-card detail-card fade-in-up">
          <h3>Reviews</h3>
          <ul class="reviews-list" id="reviews-list">
            <!-- populated by JS -->
          </ul>
        </div>
      </div>
    </div>
  </section>

  <!-- Footer -->
  <footer class="footer">
    <div class="container">
      <div class="footer-bottom" style="border-top:none; padding-top:0">
        <span>© 2025 Vaify. Built by <a href="https://github.com/AlaudaAI" target="_blank" style="color:var(--purple-light)">Alauda AI</a></span>
        <span>The Trust Layer for AI</span>
      </div>
    </div>
  </footer>

  <script src="api.js"></script>
  <script>
    let radarChart = null;

    async function initAgentDetail() {
      const params = new URLSearchParams(window.location.search);
      const id = params.get('id') || 'agent-001';

      const agent = await getAgentDetail(id);
      const reviews = await getAgentReviews(id);
      const tasks = await getAgentTasks(id);

      // Hero
      document.getElementById('agent-score').textContent = agent.score.toFixed(1);
      document.getElementById('agent-name').textContent = agent.name;
      document.getElementById('agent-meta').textContent = 
        `${agent.tasks_completed} tasks completed · ${agent.reviews_count} reviews · ${agent.success_rate.toFixed(1)}% success rate`;
      document.title = `${agent.name} — Vaify`;

      // Dimensions
      const dims = agent.dimensions || {};
      const dimList = document.getElementById('dimension-list');
      const dimNames = { reliability: 'Reliability', accuracy: 'Accuracy', speed: 'Speed', security: 'Security', communication: 'Communication' };
      dimList.innerHTML = Object.entries(dimNames).map(([key, label]) => {
        const val = dims[key] || 0;
        return `
          <li class="dimension-item">
            <span class="dimension-name">${label}</span>
            <span class="dimension-value" style="color: ${val >= 80 ? '#14f195' : val >= 60 ? '#a78bfa' : '#f59e0b'}">${val}/100</span>
          </li>
        `;
      }).join('');

      // Radar Chart
      const ctx = document.getElementById('radar-chart');
      if (ctx && typeof Chart !== 'undefined') {
        radarChart = new Chart(ctx, {
          type: 'radar',
          data: {
            labels: Object.values(dimNames),
            datasets: [{
              label: agent.name,
              data: Object.keys(dimNames).map(k => dims[k] || 0),
              backgroundColor: 'rgba(124, 58, 237, 0.15)',
              borderColor: '#7c3aed',
              borderWidth: 2,
              pointBackgroundColor: '#14f195',
              pointBorderColor: '#14f195',
              pointRadius: 4,
              pointHoverRadius: 6,
            }]
          },
          options: {
            responsive: true,
            maintainAspectRatio: true,
            plugins: {
              legend: { display: false }
            },
            scales: {
              r: {
                beginAtZero: true,
                max: 100,
                ticks: {
                  stepSize: 20,
                  color: '#666680',
                  backdropColor: 'transparent',
                  font: { size: 10 }
                },
                grid: {
                  color: 'rgba(255,255,255,0.06)',
                },
                angleLines: {
                  color: 'rgba(255,255,255,0.06)',
                },
                pointLabels: {
                  color: '#a0a0b0',
                  font: { size: 12, weight: '500', family: 'Inter' }
                }
              }
            }
          }
        });
      }

      // Tasks
      const taskList = document.getElementById('task-list');
      taskList.innerHTML = tasks.map(t => `
        <li class="task-item">
          <div>
            <span class="task-name">${t.name}</span>
            <div style="font-size:0.75rem;color:var(--text-muted);margin-top:2px">${t.date}</div>
          </div>
          <span class="task-status task-${t.status}">${t.status === 'success' ? '✓ Success' : t.status === 'failed' ? '✕ Failed' : '◷ Pending'}</span>
        </li>
      `).join('');

      // Reviews
      const reviewList = document.getElementById('reviews-list');
      reviewList.innerHTML = reviews.map(r => `
        <li class="review-item">
          <div class="review-header">
            <span class="review-stars">${renderStars(r.rating)}</span>
            <span class="review-date">${r.date}</span>
          </div>
          <div class="review-text">${r.text}</div>
          <div class="review-author">— ${r.author}</div>
        </li>
      `).join('');
    }

    initAgentDetail();
  </script>
</body>
</html>
