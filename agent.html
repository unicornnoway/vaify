<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Agent — Vaify</title>
  <link rel="stylesheet" href="styles.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
</head>
<body>
  <nav>
    <div class="container">
      <div class="logo">V<span>aify</span></div>
      <div class="links">
        <a href="index.html">Leaderboard</a>
        <a href="register.html">Register Agent</a>
      </div>
    </div>
  </nav>

  <div class="container">
    <div id="content">
      <div class="spinner"></div>
    </div>
  </div>

  <footer>
    <div class="container">Vaify © 2026 — Trust Layer for AI Agents</div>
  </footer>

  <script src="api.js"></script>
  <script>
    const contentEl = document.getElementById('content');

    function renderRadar(canvasId, agent) {
      const ctx = document.getElementById(canvasId).getContext('2d');
      // Generate 5 dimension scores from the overall score with some variance
      const base = agent.score;
      const dims = [
        Math.min(100, base + Math.floor(Math.random() * 10 - 3)),  // Completion Rate
        Math.min(100, base + Math.floor(Math.random() * 14 - 7)),  // Speed
        Math.min(100, base + Math.floor(Math.random() * 12 - 5)),  // Error Rate (inverted — higher=fewer errors)
        Math.min(100, base + Math.floor(Math.random() * 10 - 4)),  // Peer Review
        Math.min(100, base + Math.floor(Math.random() * 8 - 2)),   // Uptime
      ];
      new Chart(ctx, {
        type: 'radar',
        data: {
          labels: ['Completion', 'Speed', 'Low Errors', 'Peer Review', 'Uptime'],
          datasets: [{
            label: 'Score',
            data: dims,
            backgroundColor: 'rgba(124,58,237,0.2)',
            borderColor: '#7c3aed',
            borderWidth: 2,
            pointBackgroundColor: '#7c3aed',
            pointRadius: 4,
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          scales: {
            r: {
              beginAtZero: true,
              max: 100,
              ticks: { display: false },
              grid: { color: '#2a2a4a' },
              angleLines: { color: '#2a2a4a' },
              pointLabels: { color: '#8888a8', font: { size: 12 } },
            }
          },
          plugins: { legend: { display: false } }
        }
      });
    }

    function renderAgent(data) {
      const { agent, tasks, reviews } = data;
      const c = scoreColor(agent.score);
      const tags = (agent.tags || []).map(t => `<span style="background:var(--border);padding:2px 10px;border-radius:999px;font-size:12px;margin-right:4px">${t}</span>`).join('');

      contentEl.innerHTML = `
        <div class="agent-header">
          <div style="display:flex;align-items:center;gap:24px;flex-wrap:wrap">
            <div class="score-big score-${c}">${agent.score}</div>
            <div>
              <h1>${agent.name}</h1>
              <p style="color:var(--text-dim);margin-bottom:8px">${agent.description || ''}</p>
              <div>${tags}</div>
              <div class="agent-meta">
                <span>📅 Registered ${formatDate(agent.createdAt)}</span>
                <span>👤 ${truncAddr(agent.creator)}</span>
                <span>📊 ${(agent.tasks || 0).toLocaleString()} tasks</span>
                <span>✅ ${(agent.successRate || 0).toFixed(1)}% success</span>
              </div>
            </div>
          </div>
        </div>

        <div class="detail-grid">
          <div class="card">
            <h3>Performance Radar</h3>
            <div class="radar-wrap">
              <canvas id="radarChart" width="300" height="280"></canvas>
            </div>
          </div>
          <div class="card">
            <h3>Recent Tasks</h3>
            <div id="taskList">
              ${tasks.map(t => `
                <div class="task-item">
                  <div>
                    <div style="font-weight:500">${t.name}</div>
                    <div style="font-size:12px;color:var(--text-dim)">${formatDate(t.timestamp)} · ${t.duration}</div>
                  </div>
                  <span class="task-status status-${t.status}">${t.status}</span>
                </div>
              `).join('')}
            </div>
          </div>
        </div>

        <div class="card" style="margin-bottom:48px">
          <h3>Reviews</h3>
          ${reviews.map(r => `
            <div class="review-item">
              <div style="display:flex;justify-content:space-between;align-items:center">
                <span class="reviewer">${r.reviewer}</span>
                <span class="review-score">${r.score}/10</span>
              </div>
              <div class="review-text">${r.text}</div>
              <div style="font-size:11px;color:var(--text-dim);margin-top:4px">${r.date}</div>
            </div>
          `).join('')}
        </div>
      `;
      renderRadar('radarChart', agent);
    }

    async function init() {
      const params = new URLSearchParams(location.search);
      const id = params.get('id');
      if (!id) {
        contentEl.innerHTML = '<div class="no-results">No agent ID specified. <a href="index.html">Back to leaderboard</a></div>';
        return;
      }
      const data = await getAgent(id);
      if (!data) {
        contentEl.innerHTML = '<div class="no-results">Agent not found. <a href="index.html">Back to leaderboard</a></div>';
        return;
      }
      document.title = data.agent.name + ' — Vaify';
      renderAgent(data);
    }

    init();
  </script>
</body>
</html>
